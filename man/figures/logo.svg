<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 139" width="120" height="139">
  <!-- Hex background -->
  <polygon points="60,4 113,34 113,94 60,124 7,94 7,34"
           fill="#1E3A5F" stroke="#185FA5" stroke-width="3"/>

  <!-- h² symbol - large and centred -->
  <text x="30" y="75" font-family="Livvic, Georgia, serif"
        font-size="38" font-weight="700" fill="#EEF5FF">h</text>
  <text x="57" y="58" font-family="Livvic, Georgia, serif"
        font-size="22" font-weight="700" fill="#BA7517">2</text>

  <!-- Subtle forest-plot tick marks in amber -->
  <line x1="18" y1="88" x2="102" y2="88" stroke="#185FA5" stroke-width="1" opacity="0.4"/>
  <line x1="44" y1="84" x2="44" y2="92" stroke="#BA7517" stroke-width="2"/>
  <circle cx="44" cy="88" r="3.5" fill="#BA7517"/>
  <line x1="34" y1="88" x2="54" y2="88" stroke="#BA7517" stroke-width="1.5"/>
  <line x1="70" y1="84" x2="70" y2="92" stroke="#1D9E75" stroke-width="2"/>
  <circle cx="70" cy="88" r="3.5" fill="#1D9E75"/>
  <line x1="58" y1="88" x2="82" y2="88" stroke="#1D9E75" stroke-width="1.5"/>

  <!-- Package name below hex -->
  <text x="60" y="136" font-family="Livvic, Georgia, serif"
        font-size="13" font-weight="700" fill="#1E3A5F"
        text-anchor="middle" letter-spacing="1">R-itable</text>
</svg>
