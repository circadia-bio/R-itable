<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 139" width="120" height="139">
  <!-- Hex background: deep navy -->
  <polygon points="60,4 113,34 113,94 60,124 7,94 7,34"
           fill="#1E3A5F" stroke="#44ACFF" stroke-width="2.5"/>

  <!-- h² — pink h, blue superscript 2 -->
  <text x="28" y="76" font-family="Livvic, Georgia, serif"
        font-size="42" font-weight="700" fill="#FE9EC7">h</text>
  <text x="58" y="56" font-family="Livvic, Georgia, serif"
        font-size="24" font-weight="700" fill="#44ACFF">2</text>

  <!-- Forest-plot motif: baseline + two CI lines with points -->
  <line x1="16" y1="92" x2="104" y2="92" stroke="#44ACFF" stroke-width="0.8" opacity="0.35"/>

  <!-- Point 1: pink -->
  <line x1="36" y1="87" x2="36" y2="97" stroke="#FE9EC7" stroke-width="2"/>
  <line x1="24" y1="92" x2="48" y2="92" stroke="#FE9EC7" stroke-width="1.5"/>
  <circle cx="36" cy="92" r="3.5" fill="#FE9EC7"/>

  <!-- Point 2: blue -->
  <line x1="72" y1="87" x2="72" y2="97" stroke="#44ACFF" stroke-width="2"/>
  <line x1="58" y1="92" x2="86" y2="92" stroke="#44ACFF" stroke-width="1.5"/>
  <circle cx="72" cy="92" r="3.5" fill="#44ACFF"/>

  <!-- Package name -->
  <text x="60" y="136" font-family="Livvic, Georgia, serif"
        font-size="13" font-weight="700" fill="#1E3A5F"
        text-anchor="middle" letter-spacing="1">Ritable</text>
</svg>
