url: https://r-itable.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # -- Colours ---------------------------------------------------------------
    bg:              "#EEF5FF"          # light blue-white background
    fg:              "#1E3A5F"          # deep navy  - body text & headings
    primary:         "#185FA5"          # itable blue - links, buttons, navbar
    secondary:       "#94A3B8"          # slate      - muted text, meta
    success:         "#1D9E75"          # teal       - S measure colour
    info:            "#C8DFF5"          # light-blue - callout bg
    warning:         "#BA7517"          # amber      - I measure / badges
    danger:          "#C0392B"

    # -- Fonts -----------------------------------------------------------------
    base_font:       {google: "Afacad"}
    heading_font:    {google: "Livvic"}
    code_font:       {google: "JetBrains Mono"}

    # -- Typography ------------------------------------------------------------
    font-size-base:  "1rem"
    headings-font-weight: 700

    # -- Cards / surfaces ------------------------------------------------------
    card-bg:         "#FFFFFF"
    card-border-color: "#E2EAF4"
    card-border-radius: "0.75rem"

    # -- Code blocks -----------------------------------------------------------
    pre-bg:          "#1E3A5F"
    pre-color:       "#EEF5FF"

  includes:
    in_header: |
      <!-- R-itable custom CSS -->
      <style>
        /* -- Navbar -- */
        .navbar {
          background-color: #1E3A5F !important;
          border-bottom: 2px solid #185FA5;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar .navbar-toggler-icon,
        .navbar form .btn {
          color: #EEF5FF !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.8; }
        .navbar-nav .nav-link.active {
          color: #EEF5FF !important;
          border-bottom: 2px solid #BA7517;
        }
        .navbar small.nav-text { color: #BA7517 !important; }

        /* -- Navbar logo size -- */
        .navbar-brand img { height: 40px; width: auto; }

        /* -- Remove border under page title -- */
        .page-header { border-bottom: none !important; }

        /* -- Sidebar TOC links -- */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #1E3A5F !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #185FA5 !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #185FA5 !important;
          border-left: 2px solid #BA7517;
          font-weight: 600;
        }

        /* -- Kill all text-muted on light backgrounds -- */
        .text-muted { color: #185FA5 !important; }

        /* -- Sidebar border -- */
        .sidebar { border-left: 3px solid #185FA5; padding-left: 1rem; }

        /* -- Reference index section headers -- */
        .reference-index h2 {
          color: #BA7517;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* -- Inline code -- */
        code { color: #185FA5; background: #E2EAF4;
          border-radius: 4px; padding: 0.1em 0.35em; }

        /* -- Footer -- */
        .footer { background: #1E3A5F; color: #94A3B8; padding: 1.5rem 0; }
        .footer a { color: #C8DFF5; }

        /* -- Search -- */
        #search-input { border-color: #185FA5; }
      </style>

logo: man/figures/logo.svg
favicon: man/figures/logo.svg

home:
  title: "R-itable — Pedigree-based heritability estimation"
  description: >
    An R package for profile-likelihood variance-components heritability
    estimation in family cohort studies. No SOLAR Eclipse required.
    Built by the Circadia Lab at Northumbria University.
  links:
  - text: Circadia Lab
    href: https://circadia-lab.uk
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/R-itable
      aria-label: GitHub

reference:
- title: "Genetic relationship matrix"
  desc: "Build the additive GRM from a pedigree data frame."
  contents:
  - build_grm

- title: "Heritability estimation"
  desc: "Single-trait and batch profile-likelihood VC estimation."
  contents:
  - herit_vc
  - herit_batch

- title: "Utilities"
  desc: "Helper functions used internally and exported for pipelines."
  contents:
  - int_transform

- title: "Visualisation"
  desc: "Forest plots for heritability results."
  contents:
  - plot_forest

- title: "Package"
  desc: "Package-level documentation."
  contents:
  - itable

articles:
- title: "Getting started"
  navbar: ~
  contents:
  - getting-started

news:
  releases:
  - text: "Changelog"
    href: news/index.html

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319

footer:
  structure:
    left: [package, developed_by]
    right: [built_with]
  components:
    package: >
      **R-itable** — Circadia Lab, Northumbria University.
    developed_by: >
      Lucas França.
