url: https://r-itable.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # -- Colours ---------------------------------------------------------------
    bg:              "#F7FBFF"
    fg:              "#1E3A5F"
    primary:         "#44ACFF"
    secondary:       "#89D4FF"
    success:         "#44ACFF"
    info:            "#89D4FF"
    warning:         "#FE9EC7"
    danger:          "#C0392B"

    # -- Fonts -----------------------------------------------------------------
    base_font:       {google: "Afacad"}
    heading_font:    {google: "Livvic"}
    code_font:       {google: "JetBrains Mono"}

    # -- Typography ------------------------------------------------------------
    font-size-base:  "1rem"
    headings-font-weight: 700

    # -- Cards / surfaces ------------------------------------------------------
    card-bg:         "#FFFFFF"
    card-border-color: "#89D4FF"
    card-border-radius: "0.75rem"

    # -- Code blocks -----------------------------------------------------------
    pre-bg:          "#1E3A5F"
    pre-color:       "#F7FBFF"

  includes:
    in_header: |
      <!-- R-itable custom CSS -->
      <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
      <style>
        /* -- Navbar -- */
        .navbar {
          background-color: #1E3A5F !important;
          border-bottom: 2px solid #44ACFF;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar .navbar-toggler-icon,
        .navbar form .btn {
          color: #F7FBFF !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.8; }
        .navbar-nav .nav-link.active {
          color: #F7FBFF !important;
          border-bottom: 2px solid #FE9EC7;
        }
        .navbar small.nav-text { color: #FE9EC7 !important; }

        /* -- Navbar logo size -- */
        .navbar-brand img { height: 40px; width: auto; }

        /* -- Remove border under page title -- */
        .page-header { border-bottom: none !important; }

        /* -- Sidebar TOC links -- */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #1E3A5F !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #44ACFF !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #44ACFF !important;
          border-left: 2px solid #FE9EC7;
          font-weight: 600;
        }

        /* -- Kill all text-muted on light backgrounds -- */
        .text-muted { color: #44ACFF !important; }

        /* -- Sidebar border -- */
        .sidebar { border-left: 3px solid #44ACFF; padding-left: 1rem; }

        /* -- Reference index section headers -- */
        .reference-index h2 {
          color: #FE9EC7;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* -- Inline code -- */
        code { color: #44ACFF; background: #F9F6C4;
          border-radius: 4px; padding: 0.1em 0.35em; }

        /* -- Footer -- */
        .footer { background: #1E3A5F; color: #89D4FF; padding: 1.5rem 0; }
        .footer a { color: #FE9EC7; }

        /* -- Search -- */
        #search-input { border-color: #44ACFF; }
      </style>
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          document.title = document.title.replace(/\bRitable\b/g, 'R-itable');
          var brand = document.querySelector('.navbar-brand');
          if (brand) {
            brand.childNodes.forEach(function(node) {
              if (node.nodeType === 3) {
                node.textContent = node.textContent.replace(/\bRitable\b/g, 'R-itable');
              }
            });
          }
        });
      </script>

logo: man/figures/logo.svg
favicon: man/figures/favicon.ico

home:
  title: "R-itable — Pedigree-based heritability estimation"
  description: >
    An R package for profile-likelihood variance-components heritability
    estimation in family cohort studies. No SOLAR Eclipse required.
    Built by the Circadia Lab at Northumbria University.
  links:
  - text: Circadia Lab
    href: https://circadia-lab.uk
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  title: "R-itable"
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/R-itable
      aria-label: GitHub

reference:
- title: "Genetic relationship matrix"
  desc: "Build the additive GRM from a pedigree data frame."
  contents:
  - build_grm

- title: "Heritability estimation"
  desc: "Single-trait and batch profile-likelihood VC estimation."
  contents:
  - herit_vc
  - herit_batch

- title: "Utilities"
  desc: "Helper functions used internally and exported for pipelines."
  contents:
  - int_transform
  - Ritable_colours

- title: "Visualisation"
  desc: "Forest plots for heritability results."
  contents:
  - plot_forest

- title: "Package"
  desc: "Package-level documentation."
  contents:
  - Ritable

articles:
- title: "Getting started"
  navbar: ~
  contents:
  - getting-started

news:
  releases:
  - text: "Changelog"
    href: news/index.html

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319
  Mario Leocadio-Miguel:
    href: https://orcid.org/0000-0002-7248-3529

footer:
  structure:
    left: [package, developed_by]
    right: [built_with]
  components:
    package: >
      **R-itable** — Circadia Lab, Northumbria University.
    developed_by: >
      Lucas França & Mario Leocadio-Miguel.
